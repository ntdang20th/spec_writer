# ============================================================
# Project: spec-writer (RAG + GraphRAG spec generation engine)
# ============================================================

services:
  # -----------------------------------------------------------
  # 1. App — LlamaIndex + FastAPI (your spec writer engine)
  # -----------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: spec-writer
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - //d/Git/vc-platform:/app/codebase:ro
      - ./data/chroma:/app/data/chroma
      - ./data/graph:/app/data/graph
    environment:
      # Ollama (runs on host, not in Docker)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Models
      - LLM_MODEL=llama3.2
      - EMBED_MODEL=nomic-embed-text
      - GRAPH_LLM_MODEL=qwen2.5-coder:7b
      # Neo4j
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=specwriter123
      # Optional: Claude API for high-quality output
      # - ANTHROPIC_API_KEY=sk-ant-...
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - neo4j

  # -----------------------------------------------------------
  # 2. ChromaDB — vector database
  # -----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: spec-writer-chromadb
    ports:
      - "8100:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # -----------------------------------------------------------
  # 3. Neo4j — graph database (GraphRAG)
  # -----------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: spec-writer-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/data:/data
    environment:
      - NEO4J_AUTH=neo4j/specwriter123
      - NEO4J_PLUGINS=["apoc"]