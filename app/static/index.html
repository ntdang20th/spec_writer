<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Writer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .header { background: #1a1a1a; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.ok { background: #4ade80; }
  .status-dot.err { background: #f87171; }
  .status-bar { font-size: 12px; color: #aaa; display: flex; gap: 16px; align-items: center; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .tabs { display: flex; gap: 0; margin: 0 0 24px; border-bottom: 1px solid #ddd; }
  .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: #666; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 20px; margin: 0 0 16px; }
  .form-group { margin: 0 0 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin: 0 0 6px; }
  textarea, select, input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; background: #fff; }
  textarea:focus, select:focus, input[type=text]:focus { outline: none; border-color: #1a1a1a; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #999; cursor: not-allowed; }
  .btn-outline { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f5f5f0; }
  .btn-group { display: flex; gap: 8px; margin: 16px 0 0; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { margin: 24px 0 0; }
  .result h2 { font-size: 16px; font-weight: 500; margin: 0 0 12px; }
  .spec-section { margin: 0 0 20px; }
  .spec-section h3 { font-size: 14px; font-weight: 500; color: #333; margin: 0 0 8px; padding: 0 0 4px; border-bottom: 1px solid #eee; }
  .entity-row { display: flex; gap: 8px; align-items: baseline; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f5f5f0; }
  .entity-action { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
  .entity-action.create { background: #dcfce7; color: #166534; }
  .entity-action.modify { background: #fef9c3; color: #854d0e; }
  .entity-action.reference { background: #e0e7ff; color: #3730a3; }
  .entity-type { color: #888; font-size: 12px; min-width: 80px; }
  .entity-name { font-weight: 500; }
  .entity-detail { color: #666; font-size: 12px; }
  .api-card { padding: 10px 12px; background: #fafaf8; border-radius: 8px; margin: 0 0 8px; font-size: 13px; }
  .api-method { font-weight: 600; font-size: 12px; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
  .api-method.get { background: #dcfce7; color: #166534; }
  .api-method.post { background: #dbeafe; color: #1e40af; }
  .api-method.put { background: #fef9c3; color: #854d0e; }
  .api-method.delete { background: #fee2e2; color: #991b1b; }
  .step-list { counter-reset: step; list-style: none; padding: 0; }
  .step-list li { counter-increment: step; padding: 8px 0 8px 32px; font-size: 13px; position: relative; border-bottom: 1px solid #f5f5f0; }
  .step-list li::before { content: counter(step); position: absolute; left: 0; width: 22px; height: 22px; background: #1a1a1a; color: #fff; border-radius: 50%; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .test-card { padding: 10px 12px; background: #fafaf8; border-radius: 8px; margin: 0 0 8px; font-size: 13px; }
  .test-card strong { font-weight: 500; }
  .test-label { color: #888; font-size: 12px; min-width: 50px; display: inline-block; }
  .markdown-output { white-space: pre-wrap; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; background: #fafaf8; padding: 16px; border-radius: 8px; border: 1px solid #e5e5e0; max-height: 500px; overflow-y: auto; }
  .source-chip { display: inline-block; font-size: 11px; background: #f0f0eb; padding: 2px 8px; border-radius: 4px; margin: 2px; color: #555; }
  .answer-box { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .empty { color: #999; font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>Spec Writer</h1>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">Checking...</span></span>
    <span id="statsText"></span>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('spec')">Generate spec</button>
    <button class="tab" onclick="switchTab('query')">Query codebase</button>
    <button class="tab" onclick="switchTab('index')">Re-index</button>
  </div>

  <div id="tab-spec" class="panel active">
    <div class="card">
      <div class="form-group">
        <label>Feature description</label>
        <textarea id="specFeature" rows="3" placeholder="e.g. Add a comment system to tickets where users can add comments and get notified"></textarea>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Retrieval mode</label>
          <select id="specMode">
            <option value="true">GraphRAG (vector + graph)</option>
            <option value="false">Vector RAG only</option>
          </select>
        </div>
        <div class="form-group">
          <label>Model override (optional)</label>
          <input type="text" id="specModel" placeholder="e.g. qwen2.5-coder:7b (empty = default)">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="specBtn" onclick="generateSpec()">Generate specification</button>
        <button class="btn btn-outline" id="specExportBtn" onclick="exportMarkdown()" style="display:none">Copy markdown</button>
      </div>
    </div>
    <div id="specResult" class="result"></div>
  </div>

  <div id="tab-query" class="panel">
    <div class="card">
      <div class="form-group">
        <label>Question about the codebase</label>
        <textarea id="queryQuestion" rows="2" placeholder="e.g. How does the authentication system work?"></textarea>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Mode</label>
          <select id="queryMode">
            <option value="graph">GraphRAG</option>
            <option value="vector">Vector only</option>
          </select>
        </div>
        <div class="form-group">
          <label>Top K results</label>
          <select id="queryTopK">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="queryBtn" onclick="queryCodebase()">Ask</button>
      </div>
    </div>
    <div id="queryResult" class="result"></div>
  </div>

  <div id="tab-index" class="panel">
    <div class="card">
      <p style="font-size:14px;color:#555;margin:0 0 16px">Re-index the codebase when you switch projects or update code.</p>
      <div class="btn-group">
        <button class="btn btn-primary" id="indexIncrBtn" onclick="reindex('incremental')">Update changes only</button>
        <button class="btn btn-outline" id="indexVectorBtn" onclick="reindex('vector')">Full vector rebuild</button>
        <button class="btn btn-outline" id="indexGraphBtn" onclick="reindex('graph')">Full graph rebuild</button>
      </div>
      <div style="margin:12px 0 0">
        <button class="btn btn-outline" onclick="checkChanges()" style="font-size:12px;padding:6px 12px">Check for changes</button>
        <span id="changesInfo" style="font-size:12px;color:#888;margin-left:8px"></span>
      </div>
    </div>
    <div id="indexResult" class="result"></div>
  </div>
</div>

<script>
const API = '';
let lastSpec = null;

async function checkStatus() {
  try {
    const r = await fetch(API + '/status');
    const d = await r.json();
    document.getElementById('statusDot').className = 'status-dot ok';
    document.getElementById('statusText').textContent = 'Connected';
    document.getElementById('statsText').textContent =
      d.vector_count + ' vectors | ' + d.graph_entities + ' entities | ' + d.graph_triplets + ' triplets | ' + d.llm_model;
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('statusText').textContent = 'Disconnected';
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

async function generateSpec() {
  const btn = document.getElementById('specBtn');
  const feature = document.getElementById('specFeature').value.trim();
  if (!feature) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating...';
  document.getElementById('specResult').innerHTML = '';
  document.getElementById('specExportBtn').style.display = 'none';

  try {
    const r = await fetch(API + '/spec', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        feature: feature,
        use_graph: document.getElementById('specMode').value === 'true',
        model: document.getElementById('specModel').value.trim(),
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'API error');

    lastSpec = d;
    renderSpec(d.spec, d.model_used, d.mode);
    document.getElementById('specExportBtn').style.display = 'inline-block';
  } catch(e) {
    document.getElementById('specResult').innerHTML =
      '<div class="card" style="border-color:#fee2e2"><p style="color:#991b1b">Error: ' + e.message + '</p></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate specification';
  }
}

function renderSpec(s, model, mode) {
  let h = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin:0 0 12px">';
  h += '<h2>' + esc(s.title) + '</h2>';
  h += '<span style="font-size:11px;color:#888">' + esc(model) + ' | ' + esc(mode) + '</span></div>';
  h += '<p style="font-size:14px;color:#555;line-height:1.6;margin:0 0 20px">' + esc(s.overview) + '</p>';

  if (s.entities_affected && s.entities_affected.length) {
    h += '<div class="spec-section"><h3>Entities affected</h3>';
    s.entities_affected.forEach(e => {
      const ac = (e.action || '').toLowerCase();
      const cls = ac.includes('create') ? 'create' : ac.includes('modify') ? 'modify' : 'reference';
      h += '<div class="entity-row"><span class="entity-action ' + cls + '">' + esc(e.action) + '</span>';
      h += '<span class="entity-type">' + esc(e.entity_type) + '</span>';
      h += '<span class="entity-name">' + esc(e.name) + '</span>';
      h += '<span class="entity-detail">' + esc(e.details) + '</span></div>';
    });
    h += '</div>';
  }

  if (s.api_contracts && s.api_contracts.length) {
    h += '<div class="spec-section"><h3>API contracts</h3>';
    s.api_contracts.forEach(a => {
      const m = (a.method || 'GET').toLowerCase();
      h += '<div class="api-card"><span class="api-method ' + m + '">' + esc(a.method) + '</span>';
      h += '<strong>' + esc(a.path) + '</strong>';
      h += '<div style="margin:4px 0 0;color:#666">' + esc(a.description) + '</div>';
      if (a.request_body) h += '<div style="margin:4px 0 0;font-family:monospace;font-size:12px;color:#888">Request: ' + esc(a.request_body) + '</div>';
      if (a.response_body) h += '<div style="font-family:monospace;font-size:12px;color:#888">Response: ' + esc(a.response_body) + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  if (s.message_contracts && s.message_contracts.length) {
    h += '<div class="spec-section"><h3>Message contracts</h3>';
    s.message_contracts.forEach(m => {
      h += '<div class="api-card"><strong>' + esc(m.name) + '</strong> <span style="font-size:11px;color:#888">(' + esc(m.direction) + ')</span>';
      h += '<div style="margin:4px 0 0;color:#666">' + esc(m.description) + '</div>';
      if (m.fields) h += '<div style="font-family:monospace;font-size:12px;color:#888">Fields: ' + esc(m.fields) + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  if (s.data_model_changes) {
    h += '<div class="spec-section"><h3>Data model changes</h3><p style="font-size:13px;color:#555;line-height:1.6">' + esc(s.data_model_changes) + '</p></div>';
  }

  if (s.dependencies) {
    h += '<div class="spec-section"><h3>Dependencies</h3><p style="font-size:13px;color:#555;line-height:1.6">' + esc(s.dependencies) + '</p></div>';
  }

  if (s.implementation_steps && s.implementation_steps.length) {
    h += '<div class="spec-section"><h3>Implementation steps</h3><ol class="step-list">';
    s.implementation_steps.forEach(st => { h += '<li>' + esc(st) + '</li>'; });
    h += '</ol></div>';
  }

  if (s.test_cases && s.test_cases.length) {
    h += '<div class="spec-section"><h3>Test cases</h3>';
    s.test_cases.forEach(t => {
      h += '<div class="test-card"><strong>' + esc(t.scenario) + '</strong>';
      h += '<div><span class="test-label">Given:</span> ' + esc(t.given) + '</div>';
      h += '<div><span class="test-label">When:</span> ' + esc(t.when) + '</div>';
      h += '<div><span class="test-label">Then:</span> ' + esc(t.then) + '</div></div>';
    });
    h += '</div>';
  }

  if (s.notes) {
    h += '<div class="spec-section"><h3>Notes</h3><p style="font-size:13px;color:#555;line-height:1.6">' + esc(s.notes) + '</p></div>';
  }

  h += '</div>';
  document.getElementById('specResult').innerHTML = h;
}

function exportMarkdown() {
  if (!lastSpec) return;
  navigator.clipboard.writeText(lastSpec.markdown).then(() => {
    const btn = document.getElementById('specExportBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy markdown'; }, 2000);
  });
}

async function queryCodebase() {
  const btn = document.getElementById('queryBtn');
  const q = document.getElementById('queryQuestion').value.trim();
  if (!q) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Thinking...';
  document.getElementById('queryResult').innerHTML = '';

  try {
    const r = await fetch(API + '/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        question: q,
        mode: document.getElementById('queryMode').value,
        top_k: parseInt(document.getElementById('queryTopK').value),
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'API error');

    let h = '<div class="card"><h2>Answer</h2><div class="answer-box" style="margin:12px 0">' + esc(d.answer) + '</div>';
    if (d.sources && d.sources.length) {
      h += '<div style="margin:12px 0 0"><span style="font-size:12px;color:#888">Sources:</span> ';
      d.sources.forEach(s => {
        h += '<span class="source-chip">' + esc(s.file) + ' (' + esc(s.category) + ')</span>';
      });
      h += '</div>';
    }
    h += '</div>';
    document.getElementById('queryResult').innerHTML = h;
  } catch(e) {
    document.getElementById('queryResult').innerHTML =
      '<div class="card" style="border-color:#fee2e2"><p style="color:#991b1b">Error: ' + e.message + '</p></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ask';
  }
}

async function reindex(type) {
  const btnId = type === 'incremental' ? 'indexIncrBtn' : type === 'vector' ? 'indexVectorBtn' : 'indexGraphBtn';
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Re-indexing...';
  document.getElementById('indexResult').innerHTML = '';

  try {
    const url = API + '/index/' + type;
    const body = type === 'graph' ? JSON.stringify({full_build: false}) : '{}';
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: body,
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'API error');

    let msg = '';
    if (type === 'incremental') {
      if (d.status === 'up_to_date') {
        msg = 'Everything up to date. No changes detected.';
      } else {
        msg = 'Updated! Added: ' + d.added + ', Modified: ' + d.modified + ', Deleted: ' + d.deleted;
      }
    } else {
      msg = 'Done! ' + d.documents + ' documents, ' + d.chunks + ' chunks indexed.';
    }

    document.getElementById('indexResult').innerHTML =
      '<div class="card" style="border-color:#dcfce7"><p style="color:#166534">' + msg + '</p></div>';
    checkStatus();
  } catch(e) {
    document.getElementById('indexResult').innerHTML =
      '<div class="card" style="border-color:#fee2e2"><p style="color:#991b1b">Error: ' + e.message + '</p></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = type === 'incremental' ? 'Update changes only' : type === 'vector' ? 'Full vector rebuild' : 'Full graph rebuild';
  }
}

async function checkChanges() {
  const info = document.getElementById('changesInfo');
  info.textContent = 'Checking...';
  try {
    const r = await fetch(API + '/index/changes');
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'API error');
    info.textContent = d.added + ' added, ' + d.modified + ' modified, ' + d.deleted + ' deleted, ' + d.unchanged + ' unchanged';
  } catch(e) {
    info.textContent = 'Error: ' + e.message;
  }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
